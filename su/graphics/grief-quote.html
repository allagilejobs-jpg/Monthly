<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px;
      height: 1350px;
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Poppins', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 80px;
      text-align: center;
    }
    .quote-mark {
      font-size: 120px;
      color: rgba(255,215,0,0.3);
      font-family: 'Playfair Display', serif;
      margin-bottom: -40px;
    }
    .quote {
      font-family: 'Playfair Display', serif;
      color: white;
      font-size: 52px;
      font-weight: 600;
      line-height: 1.5;
      max-width: 900px;
    }
    .highlight {
      color: #FFD700;
    }
    .emoji {
      font-size: 60px;
      margin-top: 50px;
    }
    .handle {
      position: absolute;
      bottom: 50px;
      color: rgba(255,255,255,0.5);
      font-size: 24px;
      font-family: 'Poppins', sans-serif;
    }
  </style>
</head>
<body>
  <div class="quote-mark">"</div>
  <div class="quote">
    You're allowed to <span class="highlight">grieve</span><br>
    the life you imagined<br><br>
    while <span class="highlight">loving</span><br>
    the life you have.
  </div>
  <div class="emoji">💙</div>
  <div class="handle">@spectrum_unlocked</div>
</body>
</html>

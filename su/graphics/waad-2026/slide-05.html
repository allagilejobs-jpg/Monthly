<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px;
      height: 1350px;
      background: linear-gradient(135deg, #1a1a2e 0%, #4A90A4 100%);
      font-family: 'Poppins', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 60px 80px;
    }
    .header {
      color: #FFD700;
      font-size: 42px;
      font-weight: 700;
      margin-bottom: 50px;
    }
    .item {
      color: white;
      font-size: 34px;
      font-weight: 500;
      margin-bottom: 30px;
      display: flex;
      align-items: flex-start;
      gap: 20px;
    }
    .num {
      background: #FFD700;
      color: #1a1a2e;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      flex-shrink: 0;
    }
    .handle {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.5);
      font-size: 22px;
    }
  </style>
</head>
<body>
  <div class="header">How YOU Can Show Acceptance:</div>
  <div class="item"><span class="num">1</span> Listen to autistic voices</div>
  <div class="item"><span class="num">2</span> Learn about sensory needs</div>
  <div class="item"><span class="num">3</span> Support autism-led organizations</div>
  <div class="item"><span class="num">4</span> Challenge stereotypes when you see them</div>
  <div class="item"><span class="num">5</span> Include, don't just tolerate</div>
  <div class="item"><span class="num">6</span> Ask how to help — don't assume</div>
  <div class="handle">@spectrum_unlocked</div>
</body>
</html>

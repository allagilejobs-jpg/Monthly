<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px;
      height: 1350px;
      background: linear-gradient(135deg, #1a1a2e 0%, #4A90A4 100%);
      font-family: 'Poppins', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px;
      text-align: center;
    }
    .emoji { font-size: 80px; margin-bottom: 40px; }
    .quote {
      font-family: 'Playfair Display', serif;
      color: white;
      font-size: 52px;
      font-weight: 700;
      line-height: 1.4;
      max-width: 900px;
    }
    .highlight { color: #FFD700; }
    .handle {
      position: absolute;
      bottom: 40px;
      color: rgba(255,255,255,0.5);
      font-size: 22px;
    }
  </style>
</head>
<body>
  <div class="emoji">💜</div>
  <div class="quote">
    "Autism doesn't come with a manual.<br><br>
    It comes with a <span class="highlight">family</span> who never gives up."
  </div>
  <div class="handle">@spectrum_unlocked</div>
</body>
</html>

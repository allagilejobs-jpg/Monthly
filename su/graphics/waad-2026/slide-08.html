<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px;
      height: 1350px;
      background: linear-gradient(135deg, #1a1a2e 0%, #4A90A4 100%);
      font-family: 'Poppins', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px;
      text-align: center;
    }
    .emoji { font-size: 100px; margin-bottom: 40px; }
    .title {
      color: #FFD700;
      font-size: 48px;
      font-weight: 800;
      margin-bottom: 30px;
    }
    .subtitle {
      color: white;
      font-size: 36px;
      font-weight: 500;
      margin-bottom: 50px;
    }
    .cta {
      display: flex;
      gap: 30px;
    }
    .btn {
      background: white;
      color: #1a1a2e;
      padding: 20px 40px;
      border-radius: 50px;
      font-size: 26px;
      font-weight: 700;
    }
    .handle {
      position: absolute;
      bottom: 40px;
      color: rgba(255,255,255,0.5);
      font-size: 22px;
    }
  </style>
</head>
<body>
  <div class="emoji">🧩💙</div>
  <div class="title">Happy World Autism<br>Acceptance Day!</div>
  <div class="subtitle">Share this to spread<br>real awareness 💙</div>
  <div class="cta">
    <div class="btn">💾 Save</div>
    <div class="btn">📤 Share</div>
    <div class="btn">💬 Tag Someone</div>
  </div>
  <div class="handle">@spectrum_unlocked</div>
</body>
</html>

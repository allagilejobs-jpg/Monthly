<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px;
      height: 1350px;
      background: linear-gradient(135deg, #1a1a2e 0%, #4A90A4 100%);
      font-family: 'Poppins', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px;
      text-align: center;
    }
    .header {
      color: #FFD700;
      font-size: 42px;
      font-weight: 700;
      margin-bottom: 50px;
    }
    .stat-box {
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 40px 60px;
      margin-bottom: 30px;
      width: 90%;
    }
    .stat-num {
      color: #FFD700;
      font-size: 72px;
      font-weight: 800;
    }
    .stat-text {
      color: white;
      font-size: 28px;
      font-weight: 500;
    }
    .handle {
      position: absolute;
      bottom: 40px;
      color: rgba(255,255,255,0.5);
      font-size: 22px;
    }
  </style>
</head>
<body>
  <div class="header">Why It Matters:</div>
  <div class="stat-box">
    <div class="stat-num">1 in 36</div>
    <div class="stat-text">children are diagnosed with autism</div>
  </div>
  <div class="stat-box">
    <div class="stat-num">85%</div>
    <div class="stat-text">of autistic adults are unemployed or underemployed</div>
  </div>
  <div class="stat-box">
    <div class="stat-num">∞</div>
    <div class="stat-text">families need support, not stigma</div>
  </div>
  <div class="handle">@spectrum_unlocked</div>
</body>
</html>

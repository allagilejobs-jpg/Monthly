<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px;
      height: 1350px;
      background: linear-gradient(135deg, #1a1a2e 0%, #4A90A4 100%);
      font-family: 'Poppins', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 60px 80px;
    }
    .header {
      color: #FFD700;
      font-size: 42px;
      font-weight: 700;
      margin-bottom: 50px;
    }
    .item {
      color: white;
      font-size: 36px;
      font-weight: 500;
      margin-bottom: 35px;
      display: flex;
      align-items: center;
      gap: 25px;
    }
    .emoji { font-size: 45px; }
    .handle {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.5);
      font-size: 22px;
    }
  </style>
</head>
<body>
  <div class="header">Real Acceptance Looks Like:</div>
  <div class="item"><span class="emoji">🏫</span> Schools with real accommodations</div>
  <div class="item"><span class="emoji">💼</span> Workplaces that actually hire us</div>
  <div class="item"><span class="emoji">🏥</span> Healthcare that listens</div>
  <div class="item"><span class="emoji">🏠</span> Communities that include</div>
  <div class="item"><span class="emoji">🗣️</span> Conversations that respect</div>
  <div class="item"><span class="emoji">💙</span> Love without conditions</div>
  <div class="handle">@spectrum_unlocked</div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px;
      height: 1350px;
      background: linear-gradient(135deg, #1a1a2e 0%, #4A90A4 100%);
      font-family: 'Poppins', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px;
      text-align: center;
    }
    .header {
      color: #FFD700;
      font-size: 42px;
      font-weight: 700;
      margin-bottom: 50px;
    }
    .main {
      color: white;
      font-size: 56px;
      font-weight: 800;
      line-height: 1.3;
    }
    .red { color: #FF6B6B; text-decoration: line-through; }
    .gold { color: #FFD700; }
    .handle {
      position: absolute;
      bottom: 40px;
      color: rgba(255,255,255,0.5);
      font-size: 22px;
    }
  </style>
</head>
<body>
  <div class="header">This April...</div>
  <div class="main">
    Not just<br>
    <span class="red">Awareness</span><br><br>
    But<br>
    <span class="gold">Acceptance</span><br>
    <span class="gold">Action</span><br>
    <span class="gold">Advocacy</span>
  </div>
  <div class="handle">@spectrum_unlocked</div>
</body>
</html>

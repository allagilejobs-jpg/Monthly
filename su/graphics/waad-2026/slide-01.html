<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px;
      height: 1350px;
      background: linear-gradient(135deg, #1a1a2e 0%, #4A90A4 100%);
      font-family: 'Poppins', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px;
      text-align: center;
    }
    .date {
      background: #FFD700;
      color: #1a1a2e;
      padding: 15px 40px;
      border-radius: 50px;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 40px;
    }
    .emoji { font-size: 80px; margin-bottom: 30px; }
    .title {
      color: white;
      font-size: 64px;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 30px;
    }
    .highlight { color: #FFD700; }
    .subtitle {
      color: rgba(255,255,255,0.9);
      font-size: 36px;
      font-weight: 500;
    }
    .swipe {
      position: absolute;
      bottom: 80px;
      color: rgba(255,255,255,0.7);
      font-size: 24px;
    }
    .handle {
      position: absolute;
      bottom: 40px;
      color: rgba(255,255,255,0.5);
      font-size: 22px;
    }
  </style>
</head>
<body>
  <div class="date">APRIL 2, 2026</div>
  <div class="emoji">🧩💙</div>
  <div class="title">World Autism<br><span class="highlight">Acceptance</span> Day</div>
  <div class="subtitle">What REAL awareness looks like</div>
  <div class="swipe">Swipe → to see more</div>
  <div class="handle">@spectrum_unlocked</div>
</body>
</html>

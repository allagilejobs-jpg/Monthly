<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      width: 1080px;
      height: 1080px;
      background: linear-gradient(135deg, #6B5B95 0%, #4A90A4 50%, #88B7C9 100%);
      font-family: 'Poppins', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 80px;
      text-align: center;
    }
    
    .emoji-top {
      font-size: 80px;
      margin-bottom: 40px;
    }
    
    .main-text {
      color: white;
      font-size: 52px;
      font-weight: 600;
      line-height: 1.4;
      max-width: 900px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }
    
    .highlight {
      color: #FFD700;
      font-weight: 700;
    }
    
    .subtext {
      color: rgba(255,255,255,0.9);
      font-size: 36px;
      margin-top: 40px;
      font-weight: 400;
    }
    
    .heart {
      color: #E8B86D;
      font-size: 60px;
      margin-top: 50px;
    }
    
    .handle {
      position: absolute;
      bottom: 50px;
      color: rgba(255,255,255,0.7);
      font-size: 24px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="emoji-top">☀️</div>
  <div class="main-text">
    Sunday reminder:<br>
    <span class="highlight">You made it through another week.</span>
  </div>
  <div class="subtext">That's not nothing.</div>
  <div class="heart">💜</div>
  <div class="handle">@spectrum_unlocked</div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px;
      height: 1350px;
      background: linear-gradient(135deg, #2C3E50 0%, #4A90A4 100%);
      font-family: 'Poppins', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px;
      text-align: center;
    }
    .header {
      color: #FFD700;
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 40px;
    }
    .main-text {
      color: white;
      font-size: 48px;
      font-weight: 600;
      line-height: 1.4;
      max-width: 900px;
    }
    .handle {
      position: absolute;
      bottom: 40px;
      color: rgba(255,255,255,0.5);
      font-size: 22px;
    }
  </style>
</head>
<body>
  <div class="header">What is Sensory Overload?</div>
  <div class="main-text">
    When the brain receives<br>
    <span style="color:#FFD700">more sensory input</span><br>
    than it can process at once.<br><br>
    It's not being "dramatic."<br>
    It's neurological.
  </div>
  <div class="handle">@spectrum_unlocked</div>
</body>
</html>

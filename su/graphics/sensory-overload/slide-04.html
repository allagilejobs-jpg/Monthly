<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px;
      height: 1350px;
      background: linear-gradient(135deg, #8B0000 0%, #CC4444 100%);
      font-family: 'Poppins', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px;
      text-align: center;
    }
    .header {
      color: white;
      font-size: 42px;
      font-weight: 700;
      margin-bottom: 50px;
    }
    .cross { font-size: 60px; margin-bottom: 20px; }
    .item {
      color: white;
      font-size: 44px;
      font-weight: 600;
      margin-bottom: 40px;
      text-decoration: line-through;
      opacity: 0.8;
    }
    .handle {
      position: absolute;
      bottom: 40px;
      color: rgba(255,255,255,0.5);
      font-size: 22px;
    }
  </style>
</head>
<body>
  <div class="header">❌ What DOESN'T help:</div>
  <div class="item">"Just calm down"</div>
  <div class="item">"It's not that loud"</div>
  <div class="item">"You're overreacting"</div>
  <div class="item">"Ignore it"</div>
  <div class="item">"Toughen up"</div>
  <div class="handle">@spectrum_unlocked</div>
</body>
</html>

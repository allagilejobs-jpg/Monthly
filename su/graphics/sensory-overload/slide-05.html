<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px;
      height: 1350px;
      background: linear-gradient(135deg, #1D6B4C 0%, #2E8B57 100%);
      font-family: 'Poppins', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 60px 80px;
    }
    .header {
      color: #FFD700;
      font-size: 42px;
      font-weight: 700;
      margin-bottom: 50px;
    }
    .item {
      color: white;
      font-size: 36px;
      font-weight: 500;
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .check { font-size: 40px; color: #90EE90; }
    .handle {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.5);
      font-size: 22px;
    }
  </style>
</head>
<body>
  <div class="header">✅ What DOES help:</div>
  <div class="item"><span class="check">✓</span> Reduce the input (dim lights, lower volume)</div>
  <div class="item"><span class="check">✓</span> Find a quiet space</div>
  <div class="item"><span class="check">✓</span> Noise-canceling headphones</div>
  <div class="item"><span class="check">✓</span> Sunglasses (even indoors)</div>
  <div class="item"><span class="check">✓</span> Deep pressure (weighted blanket, tight hug)</div>
  <div class="item"><span class="check">✓</span> Time. Just... time.</div>
  <div class="handle">@spectrum_unlocked</div>
</body>
</html>

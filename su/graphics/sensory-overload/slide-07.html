<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px;
      height: 1350px;
      background: linear-gradient(135deg, #2C3E50 0%, #4A90A4 100%);
      font-family: 'Poppins', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px;
      text-align: center;
    }
    .emoji { font-size: 80px; margin-bottom: 30px; }
    .main-text {
      color: white;
      font-size: 48px;
      font-weight: 600;
      line-height: 1.4;
      max-width: 900px;
    }
    .highlight { color: #FFD700; font-weight: 700; }
    .handle {
      position: absolute;
      bottom: 40px;
      color: rgba(255,255,255,0.5);
      font-size: 22px;
    }
  </style>
</head>
<body>
  <div class="emoji">💜</div>
  <div class="main-text">
    Sensory overload is<br>
    <span class="highlight">real, valid, and exhausting.</span><br><br>
    Understanding it is the<br>
    first step to supporting<br>
    someone through it.
  </div>
  <div class="handle">@spectrum_unlocked</div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px;
      height: 1350px;
      background: linear-gradient(135deg, #2C3E50 0%, #4A90A4 100%);
      font-family: 'Poppins', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px;
      text-align: center;
    }
    .emoji { font-size: 80px; margin-bottom: 30px; }
    .title {
      color: #FFD700;
      font-size: 72px;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 30px;
    }
    .subtitle {
      color: white;
      font-size: 42px;
      font-weight: 600;
      opacity: 0.9;
    }
    .swipe {
      position: absolute;
      bottom: 80px;
      color: rgba(255,255,255,0.7);
      font-size: 24px;
    }
    .handle {
      position: absolute;
      bottom: 40px;
      color: rgba(255,255,255,0.5);
      font-size: 22px;
    }
  </style>
</head>
<body>
  <div class="emoji">🧠⚡</div>
  <div class="title">Sensory Overload 101</div>
  <div class="subtitle">What it actually feels like<br>(and what actually helps)</div>
  <div class="swipe">Swipe → to learn more</div>
  <div class="handle">@spectrum_unlocked</div>
</body>
</html>

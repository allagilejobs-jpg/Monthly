<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px;
      height: 1350px;
      background: linear-gradient(135deg, #2C3E50 0%, #4A90A4 100%);
      font-family: 'Poppins', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px;
      text-align: center;
    }
    .cta {
      color: #FFD700;
      font-size: 42px;
      font-weight: 700;
      margin-bottom: 40px;
    }
    .main-text {
      color: white;
      font-size: 38px;
      font-weight: 500;
      line-height: 1.5;
      max-width: 900px;
      margin-bottom: 50px;
    }
    .buttons {
      display: flex;
      gap: 30px;
    }
    .btn {
      background: white;
      color: #2C3E50;
      padding: 20px 40px;
      border-radius: 50px;
      font-size: 28px;
      font-weight: 700;
    }
    .handle {
      position: absolute;
      bottom: 40px;
      color: rgba(255,255,255,0.5);
      font-size: 22px;
    }
  </style>
</head>
<body>
  <div class="cta">Save this for later! 📌</div>
  <div class="main-text">
    Know someone who needs<br>
    to understand sensory overload?<br><br>
    Share this with them. 💙
  </div>
  <div class="buttons">
    <div class="btn">💾 Save</div>
    <div class="btn">📤 Share</div>
    <div class="btn">💬 Comment</div>
  </div>
  <div class="handle">@spectrum_unlocked</div>
</body>
</html>

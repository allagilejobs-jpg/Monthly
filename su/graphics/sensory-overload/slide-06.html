<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px;
      height: 1350px;
      background: linear-gradient(135deg, #2C3E50 0%, #4A90A4 100%);
      font-family: 'Poppins', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px;
      text-align: center;
    }
    .header {
      color: #FFD700;
      font-size: 38px;
      font-weight: 700;
      margin-bottom: 40px;
    }
    .main-text {
      color: white;
      font-size: 44px;
      font-weight: 600;
      line-height: 1.5;
      max-width: 900px;
    }
    .highlight { color: #90EE90; }
    .handle {
      position: absolute;
      bottom: 40px;
      color: rgba(255,255,255,0.5);
      font-size: 22px;
    }
  </style>
</head>
<body>
  <div class="header">💡 For Parents & Caregivers:</div>
  <div class="main-text">
    When overload happens,<br>
    your child isn't giving you<br>
    a hard time.<br><br>
    They're <span class="highlight">having</span> a hard time.<br><br>
    Your calm is their anchor.
  </div>
  <div class="handle">@spectrum_unlocked</div>
</body>
</html>

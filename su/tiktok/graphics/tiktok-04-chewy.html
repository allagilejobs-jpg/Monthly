<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1080px; height: 1920px; font-family: 'Poppins', sans-serif; color: white;
      background: linear-gradient(165deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 80px 60px; padding-bottom: 300px;
      position: relative; overflow: hidden; }
    .bg-shape { position: absolute; border-radius: 50%; opacity: 0.08; }
    .bg-shape-1 { width: 500px; height: 500px; background: #4A90A4; top: -150px; right: -150px; }
    .bg-shape-2 { width: 400px; height: 400px; background: #E8B86D; bottom: 300px; left: -150px; }
    .subtitle { font-size: 24px; text-transform: uppercase; letter-spacing: 6px; opacity: 0.7; margin-bottom: 30px; }
    .main-title { font-family: 'Playfair Display', serif; font-size: 72px; font-weight: 800; line-height: 1.2; margin-bottom: 50px; }
    .highlight { color: #E8B86D; }
    .emoji { font-size: 100px; margin-bottom: 50px; }
    .tip-name { font-size: 38px; font-weight: 700; color: #E8B86D; margin-bottom: 35px; }
    .tip-text { font-size: 32px; line-height: 1.6; opacity: 0.9; max-width: 950px; }
    .pro-tip { font-size: 26px; opacity: 0.7; margin-top: 40px; font-style: italic; max-width: 900px; }
    .footer { position: absolute; bottom: 100px; text-align: center; }
    .save { font-size: 22px; opacity: 0.5; letter-spacing: 2px; margin-bottom: 12px; }
    .handle { font-size: 26px; opacity: 0.6; }
  </style>
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>
  <div class="subtitle">✨ SENSORY HACK ✨</div>
  <div class="main-title"><span class="highlight">Chewing</span> is Calming</div>
  <div class="emoji">🍬</div>
  <div class="tip-name">Oral Sensory Input</div>
  <div class="tip-text">Chewing is calming! Silicone chew necklaces, crunchy snacks, or thick smoothies through a straw all provide regulating oral input.</div>
  <div class="pro-tip">💡 Offer them BEFORE the meltdown starts!</div>
  <div class="footer">
    <div class="save">SAVE FOR LATER 💾</div>
    <div class="handle">@spectrum_unlocked</div>
  </div>
</body>
</html>

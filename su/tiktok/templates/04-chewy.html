<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1080px; height: 1920px; font-family: 'Poppins', sans-serif; color: white;
      background: linear-gradient(165deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      position: relative; overflow: hidden; }
    .bg-shape { position: absolute; border-radius: 50%; opacity: 0.06; }
    .bg-shape-1 { width: 450px; height: 450px; background: #4A90A4; top: -120px; right: -120px; }
    .bg-shape-2 { width: 450px; height: 450px; background: #4A90A4; bottom: -120px; left: -120px; }
    .bg-shape-3 { width: 350px; height: 350px; background: #E8B86D; top: 50%; left: -100px; transform: translateY(-50%); }
    .bg-shape-4 { width: 350px; height: 350px; background: #E8B86D; top: 50%; right: -100px; transform: translateY(-50%); }
    .content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; padding: 0 60px; text-align: center; }
    .subtitle { font-size: 26px; text-transform: uppercase; letter-spacing: 6px; opacity: 0.7; margin-bottom: 25px; }
    .main-title { font-family: 'Playfair Display', serif; font-size: 72px; font-weight: 800; line-height: 1.15; margin-bottom: 40px; }
    .highlight { color: #E8B86D; }
    .emoji { font-size: 100px; margin-bottom: 40px; display: block; }
    .tip-name { font-size: 38px; font-weight: 700; color: #E8B86D; margin-bottom: 25px; }
    .tip-text { font-size: 30px; line-height: 1.55; opacity: 0.9; max-width: 920px; margin: 0 auto 30px auto; }
    .pro-tip { font-size: 26px; opacity: 0.65; font-style: italic; max-width: 880px; margin: 0 auto; }
    .footer { position: absolute; bottom: 80px; left: 0; right: 0; text-align: center; }
    .save { font-size: 20px; opacity: 0.5; letter-spacing: 3px; margin-bottom: 12px; }
    .handle { font-size: 26px; opacity: 0.6; }
  </style>
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>
  <div class="bg-shape bg-shape-3"></div>
  <div class="bg-shape bg-shape-4"></div>
  <div class="content">
    <div class="subtitle">✨ SENSORY HACK ✨</div>
    <div class="main-title"><span class="highlight">Chewing</span> is Calming</div>
    <div class="emoji">🍬</div>
    <div class="tip-name">Oral Sensory Input</div>
    <div class="tip-text">Chewing is calming! Silicone chew necklaces, crunchy snacks, or thick smoothies through a straw all provide regulating oral input.</div>
    <div class="pro-tip">💡 Offer them BEFORE the meltdown starts!</div>
  </div>
  <div class="footer">
    <div class="save">SAVE FOR LATER 💾</div>
    <div class="handle">@spectrum_unlocked</div>
  </div>
</body>
</html>

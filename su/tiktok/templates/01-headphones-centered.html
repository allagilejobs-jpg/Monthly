<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
      width: 1080px; 
      height: 1920px; 
      font-family: 'Poppins', sans-serif; 
      color: white;
      background: linear-gradient(165deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      position: relative; 
      overflow: hidden;
    }
    
    /* SYMMETRICAL background shapes */
    .bg-shape { position: absolute; border-radius: 50%; }
    .bg-shape-1 { width: 500px; height: 500px; background: rgba(74, 144, 164, 0.08); top: -150px; right: -150px; }
    .bg-shape-2 { width: 500px; height: 500px; background: rgba(74, 144, 164, 0.08); bottom: -150px; left: -150px; }
    
    /* Main content container - centered in safe zone */
    /* Safe zone: top 100px, bottom 350px for TikTok UI */
    .content {
      position: absolute;
      top: 100px;
      bottom: 350px;
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 0 60px;
      text-align: center;
    }
    
    .subtitle { 
      font-size: 26px; 
      text-transform: uppercase; 
      letter-spacing: 6px; 
      opacity: 0.7; 
      margin-bottom: 25px; 
    }
    
    .main-title { 
      font-family: 'Playfair Display', serif; 
      font-size: 72px; 
      font-weight: 800; 
      line-height: 1.15; 
      margin-bottom: 40px; 
    }
    
    .highlight { color: #E8B86D; }
    
    .emoji { 
      font-size: 100px; 
      margin-bottom: 40px;
      display: block;
    }
    
    .tip-name { 
      font-size: 38px; 
      font-weight: 700; 
      color: #E8B86D; 
      margin-bottom: 25px; 
    }
    
    .tip-text { 
      font-size: 30px; 
      line-height: 1.55; 
      opacity: 0.9; 
      max-width: 920px;
      margin-bottom: 30px;
    }
    
    .pro-tip { 
      font-size: 26px; 
      opacity: 0.65; 
      font-style: italic; 
      max-width: 880px;
    }
    
    /* Footer - in bottom safe zone */
    .footer { 
      position: absolute; 
      bottom: 120px; 
      left: 0;
      right: 0;
      text-align: center;
    }
    
    .save { 
      font-size: 20px; 
      opacity: 0.5; 
      letter-spacing: 3px; 
      margin-bottom: 12px; 
    }
    
    .handle { 
      font-size: 26px; 
      opacity: 0.6; 
    }
  </style>
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>
  
  <div class="content">
    <div class="subtitle">✨ SENSORY HACK ✨</div>
    <div class="main-title"><span class="highlight">Noise</span> Buffer</div>
    <div class="emoji">🎧</div>
    <div class="tip-name">The Emergency Headphones</div>
    <div class="tip-text">Keep noise-canceling headphones in your bag at ALL times. Even without music, they cut sound by 20-30dB — perfect for sudden sensory overload.</div>
    <div class="pro-tip">💡 Practice putting them on at home so it's automatic in public!</div>
  </div>
  
  <div class="footer">
    <div class="save">SAVE FOR LATER 💾</div>
    <div class="handle">@spectrum_unlocked</div>
  </div>
</body>
</html>

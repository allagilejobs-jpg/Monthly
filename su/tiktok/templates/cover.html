<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
      width: 1080px; 
      height: 1920px; 
      font-family: 'Poppins', sans-serif; 
      color: white;
      background: linear-gradient(165deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      position: relative; 
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    
    /* Background shapes */
    .bg-shape { position: absolute; border-radius: 50%; }
    .bg-shape-1 { width: 500px; height: 500px; background: rgba(74, 144, 164, 0.08); top: -150px; right: -150px; }
    .bg-shape-2 { width: 500px; height: 500px; background: rgba(74, 144, 164, 0.08); bottom: -150px; left: -150px; }
    
    .content {
      text-align: center;
      padding: 0 50px;
      z-index: 1;
    }
    
    .number {
      font-size: 180px;
      font-weight: 900;
      color: #E8B86D;
      line-height: 1;
      margin-bottom: 20px;
      text-shadow: 0 4px 20px rgba(232, 184, 109, 0.3);
    }
    
    .main-title {
      font-family: 'Playfair Display', serif;
      font-size: 90px;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 40px;
    }
    
    .highlight { color: #E8B86D; }
    
    .subtitle {
      font-size: 36px;
      opacity: 0.8;
      font-weight: 500;
      margin-bottom: 60px;
    }
    
    .emojis {
      font-size: 80px;
      margin-bottom: 40px;
      display: flex;
      justify-content: center;
      gap: 30px;
    }
    
    .cta {
      font-size: 32px;
      font-weight: 700;
      color: #E8B86D;
      text-transform: uppercase;
      letter-spacing: 4px;
    }
    
    .footer { 
      position: absolute; 
      bottom: 100px; 
      left: 0;
      right: 0;
      text-align: center;
    }
    
    .handle { 
      font-size: 28px; 
      opacity: 0.6; 
    }
  </style>
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>
  
  <div class="content">
    <div class="number">4</div>
    <div class="main-title"><span class="highlight">Sensory</span> Hacks</div>
    <div class="subtitle">That Actually Work</div>
    <div class="emojis">🎧 🕶️ 🌀 🍬</div>
    <div class="cta">Watch Now →</div>
  </div>
  
  <div class="footer">
    <div class="handle">@spectrum_unlocked</div>
  </div>
</body>
</html>

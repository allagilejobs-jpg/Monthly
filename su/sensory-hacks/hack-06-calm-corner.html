<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      width: 1080px; height: 1440px; 
      font-family: 'Poppins', sans-serif; color: white;
      background: linear-gradient(165deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 60px;
      position: relative; overflow: hidden;
    }
    .bg-shape { position: absolute; border-radius: 50%; opacity: 0.08; }
    .bg-shape-1 { width: 400px; height: 400px; background: #3498DB; top: -100px; right: -100px; }
    .bg-shape-2 { width: 300px; height: 300px; background: #E8B86D; bottom: 200px; left: -100px; }
    .week-num { font-size: 16px; text-transform: uppercase; letter-spacing: 4px; opacity: 0.5; margin-bottom: 10px; }
    .subtitle { font-size: 22px; text-transform: uppercase; letter-spacing: 5px; opacity: 0.7; margin-bottom: 25px; }
    .main-title { font-family: 'Playfair Display', serif; font-size: 58px; font-weight: 800; line-height: 1.2; margin-bottom: 35px; }
    .highlight { color: #E8B86D; }
    .emoji { font-size: 80px; margin-bottom: 35px; }
    .tip-name { font-size: 32px; font-weight: 700; color: #E8B86D; margin-bottom: 25px; }
    .tip-text { font-size: 26px; line-height: 1.5; opacity: 0.9; max-width: 900px; }
    .pro-tip { font-size: 22px; opacity: 0.7; margin-top: 30px; font-style: italic; max-width: 850px; }
    .footer { position: absolute; bottom: 50px; text-align: center; }
    .save { font-size: 18px; opacity: 0.5; letter-spacing: 2px; margin-bottom: 10px; }
    .handle { font-size: 22px; opacity: 0.6; }
  </style>
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>
  <div class="week-num">Week 6</div>
  <div class="subtitle">✨ Sensory Hack ✨</div>
  <div class="main-title"><span class="highlight">Calm</span> Corner</div>
  <div class="emoji">🏕️</div>
  <div class="tip-name">The Safe Space Setup</div>
  <div class="tip-text">Create a dedicated calm-down spot at home. Small tent, bean bag, soft lighting, favorite sensory items. Not punishment — it's regulation.</div>
  <div class="pro-tip">💡 Let your child help design it — ownership matters!</div>
  <div class="footer">
    <div class="save">SAVE FOR LATER 💾</div>
    <div class="handle">@spectrum_unlocked</div>
  </div>
</body>
</html>

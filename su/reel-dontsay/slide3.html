<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1080px; height: 1920px; font-family: 'Poppins', sans-serif; color: white; }
    .slide {
      width: 1080px; height: 1920px;
      background: linear-gradient(165deg, #1a1a2e 0%, #16213e 100%);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      text-align: center; padding: 80px; padding-bottom: 350px; position: relative;
    }
    .x-mark {
      font-size: 180px; margin-bottom: 30px; opacity: 0.9;
    }
    .main-text {
      font-family: 'Playfair Display', serif; font-size: 70px; font-weight: 800;
      line-height: 1.2; margin-bottom: 40px; max-width: 900px;
      color: #E74C3C;
    }
    .sub-text {
      font-size: 32px; opacity: 0.7; line-height: 1.6; max-width: 800px;
      font-style: italic;
    }
    .logo { font-size: 26px; opacity: 0.6; margin-top: 50px; }
  </style>
</head>
<body>
  <div class="slide">
    <div class="x-mark">❌</div>
    <div class="main-text">"Have you tried disciplining them more?"</div>
    <div class="sub-text">It's not a behavior problem. It's a neurological difference.</div>
    <span class="logo">@spectrum_unlocked</span>
  </div>
</body>
</html>

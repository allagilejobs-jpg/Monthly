<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1080px; height: 1920px; font-family: 'Poppins', sans-serif; color: white; }
    .slide {
      width: 1080px; height: 1920px;
      background: linear-gradient(165deg, #0f3460 0%, #16213e 100%);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      text-align: center; padding: 80px; position: relative;
    }
    .number {
      font-size: 180px; font-weight: 900; opacity: 0.15;
      position: absolute; top: 250px; left: 80px;
    }
    .emoji { font-size: 150px; margin-bottom: 50px; }
    .main-text {
      font-family: 'Playfair Display', serif; font-size: 80px; font-weight: 800;
      line-height: 1.2; margin-bottom: 40px;
    }
    .sub-text {
      font-size: 32px; opacity: 0.7; line-height: 1.6; max-width: 800px;
    }
    .logo { position: absolute; bottom: 60px; font-size: 26px; opacity: 0.6; }
  </style>
</head>
<body>
  <div class="slide">
    <div class="number">2</div>
    <div class="emoji">🗣️</div>
    <div class="main-text">Delayed speech</div>
    <div class="sub-text">Not babbling by 12 months or no single words by 16 months</div>
    <span class="logo">@spectrum_unlocked</span>
  </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1080px; height: 1920px; font-family: 'Poppins', sans-serif; color: white; }
    .story {
      width: 1080px; height: 1920px;
      background: linear-gradient(165deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      text-align: center; padding: 80px; padding-bottom: 350px; position: relative; overflow: hidden;
    }
    .bg-shape { position: absolute; border-radius: 50%; opacity: 0.08; }
    .bg-shape-1 { width: 600px; height: 600px; background: #E8B86D; top: -200px; right: -200px; }
    .bg-shape-2 { width: 400px; height: 400px; background: #4A90A4; bottom: 500px; left: -150px; }
    .day-badge {
      background: linear-gradient(135deg, #E8B86D, #d4a35a);
      color: #1a1a2e;
      padding: 15px 40px;
      border-radius: 50px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 60px;
    }
    .quote-mark {
      font-family: 'Playfair Display', serif;
      font-size: 150px;
      opacity: 0.15;
      position: absolute;
      top: 350px;
      left: 60px;
      line-height: 1;
    }
    .main-quote {
      font-family: 'Playfair Display', serif;
      font-size: 65px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 50px;
      max-width: 900px;
      position: relative;
      z-index: 1;
    }
    .highlight { color: #E8B86D; }
    .sub-text {
      font-size: 30px;
      opacity: 0.7;
      line-height: 1.6;
      max-width: 750px;
    }
    .emoji { font-size: 80px; margin-top: 50px; }
    .logo { font-size: 26px; opacity: 0.6; margin-top: 40px; }
  </style>
</head>
<body>
  <div class="story">
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>
    <span class="quote-mark">"</span>
    <div class="day-badge">✨ Monday Motivation</div>
    <div class="main-quote">You're not failing. You're <span class="highlight">fighting</span> for your child every single day.</div>
    <div class="sub-text">And that makes you exactly the parent they need.</div>
    <div class="emoji">💙</div>
    <span class="logo">@spectrum_unlocked</span>
  </div>
</body>
</html>

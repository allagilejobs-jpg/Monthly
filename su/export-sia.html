<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px;
      height: 1080px;
      font-family: 'Poppins', sans-serif;
      color: white;
    }
    .post {
      width: 1080px;
      height: 1080px;
      background: linear-gradient(135deg, #4A90A4 0%, #2C5F6E 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 100px;
      position: relative;
    }
    .series-badge {
      position: absolute;
      top: 50px;
      left: 50px;
      background: rgba(255,255,255,0.2);
      padding: 18px 35px;
      border-radius: 40px;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .big-quote {
      position: absolute;
      top: 120px;
      left: 60px;
      font-size: 180px;
      opacity: 0.2;
      font-family: 'Playfair Display', serif;
    }
    .field-icon {
      position: absolute;
      top: 50px;
      right: 60px;
      font-size: 80px;
      opacity: 0.5;
    }
    .quote {
      font-family: 'Playfair Display', serif;
      font-size: 64px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 60px;
      position: relative;
      z-index: 1;
    }
    .person-name {
      font-size: 42px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 6px;
      opacity: 0.95;
    }
    .person-title {
      font-size: 26px;
      opacity: 0.7;
      margin-top: 15px;
      text-transform: uppercase;
      letter-spacing: 3px;
    }
    .logo {
      position: absolute;
      bottom: 35px;
      right: 50px;
      font-size: 24px;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="post">
    <span class="series-badge">🌟 Spectrum Spotlight</span>
    <span class="big-quote">"</span>
    <span class="field-icon">🎵</span>
    <div class="quote">"I'm on the spectrum and I'm okay."</div>
    <div class="person-name">Sia</div>
    <div class="person-title">Singer & Songwriter</div>
    <span class="logo">@spectrum_unlocked</span>
  </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px;
      height: 1080px;
      font-family: 'Poppins', sans-serif;
      color: white;
    }
    .post {
      width: 1080px;
      height: 1080px;
      background: linear-gradient(135deg, #9B59B6 0%, #8E44AD 100%);
      padding: 80px;
      position: relative;
    }
    .series-badge {
      background: rgba(255,255,255,0.2);
      padding: 18px 35px;
      border-radius: 40px;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      display: inline-block;
      margin-bottom: 50px;
    }
    .person-name {
      font-family: 'Playfair Display', serif;
      font-size: 72px;
      font-weight: 700;
      margin-bottom: 15px;
    }
    .person-title {
      font-size: 32px;
      opacity: 0.85;
      margin-bottom: 60px;
    }
    .achievements {
      display: flex;
      flex-direction: column;
      gap: 25px;
    }
    .achievement {
      display: flex;
      align-items: center;
      gap: 25px;
      background: rgba(255,255,255,0.15);
      padding: 35px 45px;
      border-radius: 25px;
      font-size: 36px;
      font-weight: 500;
    }
    .achievement .check {
      font-size: 45px;
      flex-shrink: 0;
    }
    .logo {
      position: absolute;
      bottom: 35px;
      right: 50px;
      font-size: 24px;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="post">
    <span class="series-badge">💜 Autism Parent Spotlight</span>
    <div class="person-name">Holly Robinson Peete</div>
    <div class="person-title">Actress & Autism Advocate • Son RJ</div>
    <div class="achievements">
      <div class="achievement"><span class="check">✓</span> Founded HollyRod Foundation</div>
      <div class="achievement"><span class="check">✓</span> Raised $10M+ for autism families</div>
      <div class="achievement"><span class="check">✓</span> Multiple books on autism parenting</div>
    </div>
    <span class="logo">@spectrum_unlocked</span>
  </div>
</body>
</html>

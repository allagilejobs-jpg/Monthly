<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1080px; height: 1920px; font-family: 'Poppins', sans-serif; color: white; }
    .slide {
      width: 1080px; height: 1920px;
      background: linear-gradient(165deg, #0f3460 0%, #16213e 100%);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      text-align: center; padding: 80px; position: relative;
    }
    .emoji { font-size: 180px; margin-bottom: 50px; }
    .main-text {
      font-family: 'Playfair Display', serif; font-size: 90px; font-weight: 800;
      line-height: 1.2; margin-bottom: 30px;
    }
    .sub-text {
      font-size: 36px; opacity: 0.8; line-height: 1.4; max-width: 800px;
      text-transform: uppercase; letter-spacing: 3px;
    }
    .quote {
      font-size: 32px; font-style: italic; opacity: 0.6; margin-top: 50px;
      max-width: 750px; line-height: 1.5;
    }
    .logo { position: absolute; bottom: 60px; font-size: 26px; opacity: 0.6; }
  </style>
</head>
<body>
  <div class="slide">
    <div class="emoji">🎵</div>
    <div class="main-text">Sia</div>
    <div class="sub-text">Grammy-Nominated Singer</div>
    <div class="quote">"I'm on the spectrum and I'm okay."</div>
    <span class="logo">@spectrum_unlocked</span>
  </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1080px; height: 1920px; font-family: 'Poppins', sans-serif; color: white; }
    .slide {
      width: 1080px; height: 1920px;
      background: linear-gradient(165deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      text-align: center; padding: 80px; padding-bottom: 350px; position: relative; overflow: hidden;
    }
    .bg-shape { position: absolute; border-radius: 50%; opacity: 0.1; }
    .bg-shape-1 { width: 500px; height: 500px; background: #E8B86D; top: -150px; left: -150px; }
    .bg-shape-2 { width: 400px; height: 400px; background: #4A90A4; bottom: 400px; right: -100px; }
    .emoji { font-size: 120px; margin-bottom: 50px; }
    .main-text {
      font-family: 'Playfair Display', serif; font-size: 80px; font-weight: 800;
      line-height: 1.2; margin-bottom: 30px; max-width: 900px;
    }
    .highlight { color: #E8B86D; }
    .sub-text {
      font-size: 36px; opacity: 0.8; line-height: 1.6; max-width: 800px; margin-bottom: 50px;
    }
    .cta {
      background: linear-gradient(135deg, #E8B86D, #d4a35a);
      color: #1a1a2e; padding: 25px 60px; border-radius: 50px;
      font-size: 28px; font-weight: 700; text-transform: uppercase; letter-spacing: 3px;
    }
    .logo { font-size: 28px; opacity: 0.6; margin-top: 40px; }
  </style>
</head>
<body>
  <div class="slide">
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>
    <div class="emoji">💙</div>
    <div class="main-text"><span class="highlight">Different,</span> not less.</div>
    <div class="sub-text">Autism doesn't limit potential. It shapes it differently.</div>
    <div class="cta">Follow for more 🌟</div>
    <span class="logo">@spectrum_unlocked</span>
  </div>
</body>
</html>

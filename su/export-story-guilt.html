<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px;
      height: 1920px;
      font-family: 'Poppins', sans-serif;
      color: white;
    }
    .story {
      width: 1080px;
      height: 1920px;
      background: linear-gradient(165deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 80px;
      position: relative;
      overflow: hidden;
    }
    
    /* Subtle background elements */
    .bg-shape {
      position: absolute;
      border-radius: 50%;
      opacity: 0.08;
    }
    .bg-shape-1 {
      width: 600px;
      height: 600px;
      background: #9B59B6;
      top: -200px;
      right: -200px;
    }
    .bg-shape-2 {
      width: 400px;
      height: 400px;
      background: #4A90A4;
      bottom: 200px;
      left: -150px;
    }
    
    .series-badge {
      background: rgba(155, 89, 182, 0.3);
      border: 2px solid rgba(155, 89, 182, 0.5);
      padding: 18px 40px;
      border-radius: 50px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 80px;
      position: relative;
      z-index: 1;
    }
    
    .quote-mark {
      font-family: 'Playfair Display', serif;
      font-size: 200px;
      opacity: 0.15;
      position: absolute;
      top: 380px;
      left: 60px;
      line-height: 1;
    }
    
    .main-text {
      font-family: 'Playfair Display', serif;
      font-size: 82px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 60px;
      position: relative;
      z-index: 1;
      max-width: 900px;
    }
    
    .highlight {
      color: #E8B86D;
    }
    
    .subtext {
      font-size: 28px;
      opacity: 0.7;
      line-height: 1.6;
      max-width: 700px;
      position: relative;
      z-index: 1;
    }
    
    .heart {
      font-size: 60px;
      margin-top: 60px;
      opacity: 0.8;
    }
    
    .logo {
      position: absolute;
      bottom: 60px;
      font-size: 26px;
      opacity: 0.6;
      letter-spacing: 2px;
    }
    
    .swipe-hint {
      position: absolute;
      bottom: 120px;
      font-size: 20px;
      opacity: 0.4;
      text-transform: uppercase;
      letter-spacing: 3px;
    }
  </style>
</head>
<body>
  <div class="story">
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>
    
    <span class="series-badge">💜 Real Talk</span>
    
    <span class="quote-mark">"</span>
    
    <div class="main-text">
      Nobody prepares you for the <span class="highlight">guilt.</span>
    </div>
    
    <div class="subtext">
      The part of autism parenting<br>nobody warns you about.
    </div>
    
    <div class="heart">💙</div>
    
    <span class="logo">@spectrum_unlocked</span>
  </div>
</body>
</html>

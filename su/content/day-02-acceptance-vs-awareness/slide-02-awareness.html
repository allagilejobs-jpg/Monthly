<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      width: 1080px; height: 1350px; 
      font-family: 'Poppins', sans-serif; color: white;
      background: linear-gradient(165deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 60px;
      position: relative; overflow: hidden;
    }
    .bg-shape { position: absolute; border-radius: 50%; opacity: 0.06; }
    .bg-shape-1 { width: 400px; height: 400px; background: #E74C3C; top: -100px; left: -100px; }
    .label { 
      font-size: 18px; 
      text-transform: uppercase; 
      letter-spacing: 4px;
      opacity: 0.5;
      margin-bottom: 20px;
    }
    .title { 
      font-family: 'Playfair Display', serif; 
      font-size: 56px; 
      font-weight: 800; 
      margin-bottom: 50px;
      color: #E74C3C;
    }
    .problems {
      max-width: 850px;
    }
    .problem-item {
      background: rgba(231, 76, 60, 0.12);
      border-left: 5px solid #E74C3C;
      padding: 25px 35px;
      margin-bottom: 20px;
      border-radius: 0 16px 16px 0;
      text-align: left;
    }
    .problem-item .icon { font-size: 28px; margin-right: 15px; }
    .problem-item .text { font-size: 24px; line-height: 1.4; }
    .footer { position: absolute; bottom: 40px; text-align: center; }
    .slide-num { font-size: 16px; opacity: 0.4; letter-spacing: 2px; margin-bottom: 8px; }
    .handle { font-size: 18px; opacity: 0.5; }
  </style>
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  
  <div class="label">The Problem With</div>
  <div class="title">"Awareness"</div>
  
  <div class="problems">
    <div class="problem-item">
      <span class="icon">😕</span>
      <span class="text"><strong>Everyone's already "aware"</strong> — autism isn't unknown anymore</span>
    </div>
    <div class="problem-item">
      <span class="icon">📢</span>
      <span class="text"><strong>It's often about speaking FOR</strong> autistic people, not WITH them</span>
    </div>
    <div class="problem-item">
      <span class="icon">😢</span>
      <span class="text"><strong>Focuses on "tragedy"</strong> and what autistic people can't do</span>
    </div>
    <div class="problem-item">
      <span class="icon">🧩</span>
      <span class="text"><strong>Puzzle piece = "missing piece"</strong> implies something is broken</span>
    </div>
  </div>
  
  <div class="footer">
    <div class="slide-num">1 of 4</div>
    <div class="handle">@spectrum_unlocked</div>
  </div>
</body>
</html>

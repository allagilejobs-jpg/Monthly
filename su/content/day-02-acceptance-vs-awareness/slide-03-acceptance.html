<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      width: 1080px; height: 1350px; 
      font-family: 'Poppins', sans-serif; color: white;
      background: linear-gradient(165deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 60px;
      position: relative; overflow: hidden;
    }
    .bg-shape { position: absolute; border-radius: 50%; opacity: 0.06; }
    .bg-shape-1 { width: 400px; height: 400px; background: #27AE60; bottom: -100px; right: -100px; }
    .label { 
      font-size: 18px; 
      text-transform: uppercase; 
      letter-spacing: 4px;
      opacity: 0.5;
      margin-bottom: 20px;
    }
    .title { 
      font-family: 'Playfair Display', serif; 
      font-size: 56px; 
      font-weight: 800; 
      margin-bottom: 50px;
      color: #27AE60;
    }
    .benefits {
      max-width: 850px;
    }
    .benefit-item {
      background: rgba(39, 174, 96, 0.12);
      border-left: 5px solid #27AE60;
      padding: 25px 35px;
      margin-bottom: 20px;
      border-radius: 0 16px 16px 0;
      text-align: left;
    }
    .benefit-item .icon { font-size: 28px; margin-right: 15px; }
    .benefit-item .text { font-size: 24px; line-height: 1.4; }
    .footer { position: absolute; bottom: 40px; text-align: center; }
    .slide-num { font-size: 16px; opacity: 0.4; letter-spacing: 2px; margin-bottom: 8px; }
    .handle { font-size: 18px; opacity: 0.5; }
  </style>
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  
  <div class="label">The Power Of</div>
  <div class="title">"Acceptance"</div>
  
  <div class="benefits">
    <div class="benefit-item">
      <span class="icon">💙</span>
      <span class="text"><strong>Embraces autistic people</strong> as whole, complete humans</span>
    </div>
    <div class="benefit-item">
      <span class="icon">🗣️</span>
      <span class="text"><strong>Centers autistic voices</strong> — "nothing about us without us"</span>
    </div>
    <div class="benefit-item">
      <span class="icon">🌟</span>
      <span class="text"><strong>Focuses on strengths</strong> AND needs, not deficits</span>
    </div>
    <div class="benefit-item">
      <span class="icon">♾️</span>
      <span class="text"><strong>Infinity symbol = infinite possibilities</strong> and neurodiversity</span>
    </div>
  </div>
  
  <div class="footer">
    <div class="slide-num">2 of 4</div>
    <div class="handle">@spectrum_unlocked</div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      width: 1080px; height: 1350px; 
      font-family: 'Poppins', sans-serif; color: white;
      background: linear-gradient(165deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 60px;
      position: relative; overflow: hidden;
    }
    .bg-shape { position: absolute; border-radius: 50%; opacity: 0.08; }
    .bg-shape-1 { width: 400px; height: 400px; background: #4A90A4; top: -100px; left: -100px; }
    .label { 
      font-size: 18px; 
      text-transform: uppercase; 
      letter-spacing: 5px;
      opacity: 0.5;
      margin-bottom: 30px;
    }
    .title { 
      font-family: 'Playfair Display', serif; 
      font-size: 58px; 
      font-weight: 800; 
      margin-bottom: 50px;
    }
    .highlight { color: #E8B86D; }
    .quote-box {
      background: rgba(74, 144, 164, 0.15);
      border: 2px solid rgba(74, 144, 164, 0.3);
      border-radius: 24px;
      padding: 50px;
      max-width: 900px;
      margin-bottom: 40px;
    }
    .quote {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      font-style: italic;
      line-height: 1.5;
      margin-bottom: 30px;
    }
    .quote-author {
      font-size: 20px;
      opacity: 0.7;
    }
    .stats {
      display: flex;
      gap: 40px;
      justify-content: center;
    }
    .stat {
      text-align: center;
    }
    .stat-num {
      font-size: 48px;
      font-weight: 800;
      color: #E8B86D;
    }
    .stat-label {
      font-size: 16px;
      opacity: 0.7;
    }
    .footer { position: absolute; bottom: 40px; text-align: center; }
    .slide-num { font-size: 16px; opacity: 0.4; letter-spacing: 2px; margin-bottom: 8px; }
    .handle { font-size: 18px; opacity: 0.5; }
  </style>
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  
  <div class="label">2026 UN Theme</div>
  <div class="title">Autism and <span class="highlight">Humanity</span></div>
  
  <div class="quote-box">
    <div class="quote">
      "Every person deserves to be seen, valued, and included — not despite their differences, but because of who they are."
    </div>
    <div class="quote-author">— The Autism Community</div>
  </div>
  
  <div class="stats">
    <div class="stat">
      <div class="stat-num">1 in 36</div>
      <div class="stat-label">children are autistic</div>
    </div>
    <div class="stat">
      <div class="stat-num">~78M</div>
      <div class="stat-label">autistic people worldwide</div>
    </div>
  </div>
  
  <div class="footer">
    <div class="slide-num">1 of 5</div>
    <div class="handle">@spectrum_unlocked</div>
  </div>
</body>
</html>

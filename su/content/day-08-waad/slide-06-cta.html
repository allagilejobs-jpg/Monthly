<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      width: 1080px; height: 1350px; 
      font-family: 'Poppins', sans-serif; color: white;
      background: linear-gradient(165deg, #1a1a2e 0%, #0f3460 50%, #16213e 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 60px;
      position: relative; overflow: hidden;
    }
    .bg-shape { position: absolute; border-radius: 50%; }
    .bg-shape-1 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(74,144,164,0.25) 0%, transparent 70%); top: -200px; left: -200px; }
    .bg-shape-2 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(232,184,109,0.2) 0%, transparent 70%); bottom: -150px; right: -150px; }
    .infinity { font-size: 120px; margin-bottom: 30px; }
    .main-title { 
      font-family: 'Playfair Display', serif; 
      font-size: 60px; 
      font-weight: 800; 
      line-height: 1.2; 
      margin-bottom: 30px;
      max-width: 900px;
    }
    .highlight { color: #E8B86D; }
    .highlight-blue { color: #4A90A4; }
    .subtitle {
      font-size: 28px;
      opacity: 0.85;
      margin-bottom: 50px;
      max-width: 850px;
      line-height: 1.5;
    }
    .cta-primary {
      background: linear-gradient(135deg, #E8B86D 0%, #D4A84B 100%);
      color: #1a1a2e;
      padding: 30px 60px;
      border-radius: 20px;
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 30px;
      box-shadow: 0 10px 30px rgba(232, 184, 109, 0.3);
    }
    .cta-secondary {
      background: rgba(74, 144, 164, 0.2);
      border: 2px solid rgba(74, 144, 164, 0.4);
      padding: 20px 45px;
      border-radius: 16px;
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 40px;
    }
    .hashtags {
      font-size: 18px;
      opacity: 0.6;
      letter-spacing: 1px;
    }
    .footer { position: absolute; bottom: 40px; text-align: center; }
    .slide-num { font-size: 16px; opacity: 0.4; letter-spacing: 2px; margin-bottom: 8px; }
    .handle { font-size: 22px; opacity: 0.7; font-weight: 600; }
  </style>
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>
  
  <div class="infinity">♾️💙</div>
  
  <div class="main-title">
    <span class="highlight-blue">Every Life</span> Has <span class="highlight">Value</span>
  </div>
  
  <div class="subtitle">
    Share this message today. Let's make World Autism Acceptance Day mean something.
  </div>
  
  <div class="cta-primary">💙 Share far and wide</div>
  
  <div class="cta-secondary">💾 Save • 💬 Comment • ➕ Follow for more</div>
  
  <div class="hashtags">
    #WorldAutismDay #AutismAcceptance #AutismAndHumanity #WAAD2026
  </div>
  
  <div class="footer">
    <div class="slide-num">5 of 5</div>
    <div class="handle">@spectrum_unlocked</div>
  </div>
</body>
</html>

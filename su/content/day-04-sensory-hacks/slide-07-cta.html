<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      width: 1080px; height: 1350px; 
      font-family: 'Poppins', sans-serif; color: white;
      background: linear-gradient(165deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 60px;
      position: relative; overflow: hidden;
    }
    .bg-shape { position: absolute; border-radius: 50%; opacity: 0.08; }
    .bg-shape-1 { width: 500px; height: 500px; background: #27AE60; top: -150px; left: -150px; }
    .bg-shape-2 { width: 350px; height: 350px; background: #E8B86D; bottom: 50px; right: -100px; }
    .emoji-row { font-size: 70px; margin-bottom: 30px; letter-spacing: 15px; }
    .main-title { 
      font-family: 'Playfair Display', serif; 
      font-size: 54px; 
      font-weight: 800; 
      line-height: 1.2; 
      margin-bottom: 30px;
      max-width: 900px;
    }
    .highlight { color: #27AE60; }
    .highlight-gold { color: #E8B86D; }
    .subtitle {
      font-size: 26px;
      opacity: 0.85;
      margin-bottom: 50px;
      max-width: 800px;
      line-height: 1.5;
    }
    .cta-box {
      background: linear-gradient(135deg, #27AE60 0%, #1e8449 100%);
      padding: 30px 55px;
      border-radius: 20px;
      margin-bottom: 30px;
    }
    .cta-text {
      font-size: 26px;
      font-weight: 700;
    }
    .question-box {
      background: rgba(232, 184, 109, 0.15);
      border: 2px solid rgba(232, 184, 109, 0.3);
      padding: 25px 45px;
      border-radius: 16px;
      margin-bottom: 30px;
    }
    .question {
      font-size: 24px;
      font-weight: 600;
    }
    .footer { position: absolute; bottom: 40px; text-align: center; }
    .handle { font-size: 22px; opacity: 0.6; }
  </style>
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>
  
  <div class="emoji-row">🎧😎🧸⏱️🏠</div>
  
  <div class="main-title">
    <span class="highlight-gold">Small</span> Tools, <span class="highlight">Big</span> Impact
  </div>
  
  <div class="subtitle">
    Sensory regulation doesn't require expensive equipment. Start with one hack today!
  </div>
  
  <div class="cta-box">
    <div class="cta-text">💾 Save for meltdown prevention</div>
  </div>
  
  <div class="question-box">
    <div class="question">💬 What's YOUR go-to sensory hack? Comment below!</div>
  </div>
  
  <div class="footer">
    <div class="handle">@spectrum_unlocked</div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      width: 1080px; height: 1350px; 
      font-family: 'Poppins', sans-serif; color: white;
      background: linear-gradient(165deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 60px;
      position: relative; overflow: hidden;
    }
    .bg-shape { position: absolute; border-radius: 50%; opacity: 0.08; }
    .bg-shape-1 { width: 500px; height: 500px; background: #9B59B6; top: -150px; right: -150px; }
    .bg-shape-2 { width: 350px; height: 350px; background: #E8B86D; bottom: 100px; left: -100px; }
    .badge { 
      background: #9B59B6; 
      padding: 12px 30px; 
      border-radius: 30px; 
      font-size: 18px; 
      font-weight: 700; 
      text-transform: uppercase; 
      letter-spacing: 3px;
      margin-bottom: 30px;
    }
    .stat-box {
      background: rgba(155, 89, 182, 0.2);
      border: 2px solid rgba(155, 89, 182, 0.4);
      border-radius: 20px;
      padding: 25px 50px;
      margin-bottom: 40px;
    }
    .stat-num { font-size: 72px; font-weight: 800; color: #E8B86D; }
    .stat-text { font-size: 22px; opacity: 0.8; }
    .main-title { 
      font-family: 'Playfair Display', serif; 
      font-size: 62px; 
      font-weight: 800; 
      line-height: 1.1; 
      margin-bottom: 30px;
      max-width: 900px;
    }
    .highlight { color: #9B59B6; }
    .highlight-gold { color: #E8B86D; }
    .subtitle {
      font-size: 26px;
      opacity: 0.85;
      margin-bottom: 50px;
      max-width: 800px;
      line-height: 1.4;
    }
    .swipe-cta {
      display: flex;
      align-items: center;
      gap: 15px;
      font-size: 22px;
      font-weight: 600;
      opacity: 0.7;
    }
    .arrow { font-size: 30px; }
    .footer { position: absolute; bottom: 40px; text-align: center; }
    .handle { font-size: 20px; opacity: 0.5; }
  </style>
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>
  
  <div class="badge">📈 Trending Topic</div>
  
  <div class="stat-box">
    <div class="stat-num">450%</div>
    <div class="stat-text">increase in adult autism diagnoses (ages 26-34)</div>
  </div>
  
  <div class="main-title">
    <span class="highlight">Late-Diagnosed</span> Autism in <span class="highlight-gold">Women</span>
  </div>
  
  <div class="subtitle">
    Why so many women are finally getting answers — and what the journey really looks like.
  </div>
  
  <div class="swipe-cta">
    <span>Swipe to understand why</span>
    <span class="arrow">→</span>
  </div>
  
  <div class="footer">
    <div class="handle">@spectrum_unlocked</div>
  </div>
</body>
</html>

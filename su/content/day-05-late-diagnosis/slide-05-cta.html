<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      width: 1080px; height: 1350px; 
      font-family: 'Poppins', sans-serif; color: white;
      background: linear-gradient(165deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 60px;
      position: relative; overflow: hidden;
    }
    .bg-shape { position: absolute; border-radius: 50%; opacity: 0.08; }
    .bg-shape-1 { width: 500px; height: 500px; background: #9B59B6; top: -150px; left: -150px; }
    .bg-shape-2 { width: 350px; height: 350px; background: #E8B86D; bottom: 50px; right: -100px; }
    .emoji { font-size: 100px; margin-bottom: 40px; }
    .main-title { 
      font-family: 'Playfair Display', serif; 
      font-size: 54px; 
      font-weight: 800; 
      line-height: 1.2; 
      margin-bottom: 30px;
      max-width: 900px;
    }
    .highlight { color: #9B59B6; }
    .highlight-gold { color: #E8B86D; }
    .quote-box {
      background: rgba(155, 89, 182, 0.15);
      border: 2px solid rgba(155, 89, 182, 0.3);
      padding: 30px 40px;
      border-radius: 20px;
      margin-bottom: 40px;
      max-width: 850px;
    }
    .quote {
      font-size: 28px;
      font-style: italic;
      line-height: 1.5;
    }
    .cta-box {
      background: linear-gradient(135deg, #9B59B6 0%, #7D3C98 100%);
      padding: 25px 50px;
      border-radius: 16px;
      margin-bottom: 25px;
    }
    .cta-text {
      font-size: 24px;
      font-weight: 700;
    }
    .hashtags {
      font-size: 16px;
      opacity: 0.5;
    }
    .footer { position: absolute; bottom: 40px; text-align: center; }
    .handle { font-size: 20px; opacity: 0.6; }
  </style>
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>
  
  <div class="emoji">💜</div>
  
  <div class="main-title">
    It's <span class="highlight-gold">Never</span> Too Late to <span class="highlight">Understand Yourself</span>
  </div>
  
  <div class="quote-box">
    <div class="quote">
      "I spent 30 years wondering what was wrong with me. Turns out, nothing was wrong. I was just wired differently."
    </div>
  </div>
  
  <div class="cta-box">
    <div class="cta-text">💾 Save & share for someone who needs to see this</div>
  </div>
  
  <div class="hashtags">
    #latediagnosedautistic #unmaskingautism #autisticwomen
  </div>
  
  <div class="footer">
    <div class="handle">@spectrum_unlocked</div>
  </div>
</body>
</html>

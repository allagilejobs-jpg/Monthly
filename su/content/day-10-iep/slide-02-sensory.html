<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      width: 1080px; height: 1350px; 
      font-family: 'Poppins', sans-serif; color: white;
      background: linear-gradient(165deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 60px;
      position: relative; overflow: hidden;
    }
    .bg-shape { position: absolute; border-radius: 50%; opacity: 0.06; }
    .bg-shape-1 { width: 400px; height: 400px; background: #4A90A4; top: -100px; left: -100px; }
    .category-badge { 
      background: rgba(74, 144, 164, 0.2);
      border: 2px solid #4A90A4;
      padding: 12px 35px; 
      border-radius: 30px; 
      font-size: 18px; 
      font-weight: 700; 
      text-transform: uppercase; 
      letter-spacing: 3px;
      margin-bottom: 30px;
    }
    .emoji { font-size: 80px; margin-bottom: 20px; }
    .title { 
      font-family: 'Playfair Display', serif;
      font-size: 48px; 
      font-weight: 800; 
      color: #E8B86D;
      margin-bottom: 40px;
    }
    .items-box {
      background: rgba(74, 144, 164, 0.12);
      border: 2px solid rgba(74, 144, 164, 0.3);
      border-radius: 20px;
      padding: 35px 45px;
      max-width: 900px;
      text-align: left;
    }
    .item {
      font-size: 26px;
      line-height: 1.5;
      margin: 18px 0;
      display: flex;
      align-items: flex-start;
      gap: 15px;
    }
    .check { color: #27AE60; font-size: 24px; }
    .footer { position: absolute; bottom: 40px; text-align: center; }
    .slide-num { font-size: 16px; opacity: 0.4; letter-spacing: 2px; margin-bottom: 8px; }
    .handle { font-size: 18px; opacity: 0.5; }
  </style>
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  
  <div class="category-badge">Category 1</div>
  <div class="emoji">🎧</div>
  <div class="title">Sensory Supports</div>
  
  <div class="items-box">
    <div class="item"><span class="check">✓</span> Noise-canceling headphones allowed in class</div>
    <div class="item"><span class="check">✓</span> Sensory breaks as needed (not earned)</div>
    <div class="item"><span class="check">✓</span> Fidgets permitted without restriction</div>
    <div class="item"><span class="check">✓</span> Flexible seating options</div>
    <div class="item"><span class="check">✓</span> Movement breaks every 20-30 minutes</div>
    <div class="item"><span class="check">✓</span> Option for dim lighting or sunglasses</div>
  </div>
  
  <div class="footer">
    <div class="slide-num">1 of 4</div>
    <div class="handle">@spectrum_unlocked</div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      width: 1080px; height: 1350px; 
      font-family: 'Poppins', sans-serif; color: white;
      background: linear-gradient(165deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 60px;
      position: relative; overflow: hidden;
    }
    .bg-shape { position: absolute; border-radius: 50%; opacity: 0.06; }
    .bg-shape-1 { width: 400px; height: 400px; background: #9B59B6; top: 50%; left: -150px; transform: translateY(-50%); }
    .label { 
      font-size: 18px; 
      text-transform: uppercase; 
      letter-spacing: 4px;
      opacity: 0.5;
      margin-bottom: 20px;
    }
    .title { 
      font-family: 'Playfair Display', serif; 
      font-size: 52px; 
      font-weight: 800; 
      margin-bottom: 40px;
      color: #E8B86D;
    }
    .impacts {
      max-width: 850px;
    }
    .impact-section {
      margin-bottom: 35px;
    }
    .section-label {
      font-size: 18px;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 15px;
      opacity: 0.6;
    }
    .impact-box {
      background: rgba(155, 89, 182, 0.12);
      border-radius: 16px;
      padding: 25px 30px;
    }
    .impact-item {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 12px;
      font-size: 22px;
    }
    .impact-item:last-child { margin-bottom: 0; }
    .impact-item .icon { font-size: 24px; }
    .footer { position: absolute; bottom: 40px; text-align: center; }
    .slide-num { font-size: 16px; opacity: 0.4; letter-spacing: 2px; margin-bottom: 8px; }
    .handle { font-size: 18px; opacity: 0.5; }
  </style>
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  
  <div class="label">Long-Term</div>
  <div class="title">The Impact</div>
  
  <div class="impacts">
    <div class="impact-section">
      <div class="section-label">As Children</div>
      <div class="impact-box">
        <div class="impact-item"><span class="icon">😰</span> Anxiety and depression</div>
        <div class="impact-item"><span class="icon">🎭</span> Identity confusion</div>
        <div class="impact-item"><span class="icon">💔</span> Feeling unloved or less important</div>
      </div>
    </div>
    
    <div class="impact-section">
      <div class="section-label">As Adults</div>
      <div class="impact-box">
        <div class="impact-item"><span class="icon">🙅</span> Difficulty setting boundaries</div>
        <div class="impact-item"><span class="icon">🤝</span> People-pleasing patterns</div>
        <div class="impact-item"><span class="icon">😓</span> Chronic guilt for having needs</div>
      </div>
    </div>
  </div>
  
  <div class="footer">
    <div class="slide-num">3 of 5</div>
    <div class="handle">@spectrum_unlocked</div>
  </div>
</body>
</html>

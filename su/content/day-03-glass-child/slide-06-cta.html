<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      width: 1080px; height: 1350px; 
      font-family: 'Poppins', sans-serif; color: white;
      background: linear-gradient(165deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 60px;
      position: relative; overflow: hidden;
    }
    .bg-shape { position: absolute; border-radius: 50%; opacity: 0.08; }
    .bg-shape-1 { width: 500px; height: 500px; background: #4A90A4; top: -150px; left: -150px; }
    .bg-shape-2 { width: 350px; height: 350px; background: #E8B86D; bottom: 100px; right: -100px; }
    .emoji { font-size: 100px; margin-bottom: 40px; }
    .main-title { 
      font-family: 'Playfair Display', serif; 
      font-size: 54px; 
      font-weight: 800; 
      line-height: 1.2; 
      margin-bottom: 30px;
      max-width: 900px;
    }
    .highlight { color: #E8B86D; }
    .subtitle {
      font-size: 26px;
      opacity: 0.85;
      margin-bottom: 50px;
      max-width: 800px;
      line-height: 1.5;
    }
    .message-box {
      background: rgba(74, 144, 164, 0.15);
      border: 2px solid rgba(74, 144, 164, 0.3);
      padding: 30px 40px;
      border-radius: 20px;
      margin-bottom: 40px;
      max-width: 850px;
    }
    .message {
      font-size: 26px;
      font-style: italic;
      line-height: 1.5;
    }
    .cta-box {
      background: linear-gradient(135deg, #4A90A4 0%, #2C5F6E 100%);
      padding: 25px 50px;
      border-radius: 16px;
    }
    .cta-text {
      font-size: 24px;
      font-weight: 700;
    }
    .footer { position: absolute; bottom: 40px; text-align: center; }
    .slide-num { font-size: 16px; opacity: 0.4; letter-spacing: 2px; margin-bottom: 8px; }
    .handle { font-size: 20px; opacity: 0.6; }
  </style>
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>
  
  <div class="emoji">💙👨‍👩‍👧‍👦</div>
  
  <div class="main-title">
    <span class="highlight">All</span> Your Kids Need You
  </div>
  
  <div class="message-box">
    <div class="message">
      "You can't pour from an empty cup — but you also can't forget the cups that seem full are still waiting to be filled."
    </div>
  </div>
  
  <div class="subtitle">
    Tag a sibling parent who needs this 💙
  </div>
  
  <div class="cta-box">
    <div class="cta-text">💾 Save & Share for families who need it</div>
  </div>
  
  <div class="footer">
    <div class="slide-num">5 of 5</div>
    <div class="handle">@spectrum_unlocked</div>
  </div>
</body>
</html>

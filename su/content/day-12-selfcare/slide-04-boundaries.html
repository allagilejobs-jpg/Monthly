<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      width: 1080px; height: 1350px; 
      font-family: 'Poppins', sans-serif; color: white;
      background: linear-gradient(165deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 60px;
      position: relative; overflow: hidden;
    }
    .bg-shape { position: absolute; border-radius: 50%; opacity: 0.06; }
    .bg-shape-1 { width: 400px; height: 400px; background: #E74C3C; bottom: -100px; left: -100px; }
    .num { 
      background: #E74C3C; 
      width: 80px; height: 80px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; font-weight: 800;
      margin-bottom: 25px;
    }
    .emoji { font-size: 80px; margin-bottom: 20px; }
    .title { 
      font-family: 'Playfair Display', serif;
      font-size: 48px; 
      font-weight: 800; 
      color: #E8B86D;
      margin-bottom: 35px;
    }
    .content-box {
      background: rgba(231, 76, 60, 0.12);
      border: 2px solid rgba(231, 76, 60, 0.3);
      border-radius: 20px;
      padding: 35px 45px;
      max-width: 900px;
      text-align: left;
    }
    .intro {
      font-size: 24px;
      margin-bottom: 25px;
      text-align: center;
      opacity: 0.9;
    }
    .highlight { color: #E8B86D; font-weight: 700; }
    .item {
      font-size: 24px;
      line-height: 1.5;
      margin: 16px 0;
      display: flex;
      align-items: flex-start;
      gap: 15px;
    }
    .icon { font-size: 22px; }
    .footer { position: absolute; bottom: 40px; text-align: center; }
    .slide-num { font-size: 16px; opacity: 0.4; letter-spacing: 2px; margin-bottom: 8px; }
    .handle { font-size: 18px; opacity: 0.5; }
  </style>
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  
  <div class="num">3</div>
  <div class="emoji">🚫</div>
  <div class="title">Set Boundaries</div>
  
  <div class="content-box">
    <div class="intro"><span class="highlight">"No"</span> is a complete sentence.</div>
    <div class="item"><span class="icon">🎉</span> Skip events that drain you</div>
    <div class="item"><span class="icon">🙅</span> Limit unsolicited advice givers</div>
    <div class="item"><span class="icon">🔋</span> Protect your energy like a resource</div>
    <div class="item"><span class="icon">📅</span> It's OK to cancel plans</div>
    <div class="item"><span class="icon">📵</span> Turn off notifications sometimes</div>
  </div>
  
  <div class="footer">
    <div class="slide-num">3 of 4</div>
    <div class="handle">@spectrum_unlocked</div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      width: 1080px; height: 1350px; 
      font-family: 'Poppins', sans-serif; color: white;
      background: linear-gradient(165deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 60px;
      position: relative; overflow: hidden;
    }
    .bg-shape { position: absolute; border-radius: 50%; opacity: 0.06; }
    .bg-shape-1 { width: 400px; height: 400px; background: #27AE60; top: -100px; left: -100px; }
    .num { 
      background: #27AE60; 
      width: 80px; height: 80px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; font-weight: 800;
      margin-bottom: 25px;
    }
    .emoji { font-size: 80px; margin-bottom: 20px; }
    .title { 
      font-family: 'Playfair Display', serif;
      font-size: 48px; 
      font-weight: 800; 
      color: #E8B86D;
      margin-bottom: 35px;
    }
    .content-box {
      background: rgba(39, 174, 96, 0.12);
      border: 2px solid rgba(39, 174, 96, 0.3);
      border-radius: 20px;
      padding: 35px 45px;
      max-width: 900px;
      text-align: left;
    }
    .intro {
      font-size: 24px;
      margin-bottom: 25px;
      text-align: center;
      opacity: 0.9;
    }
    .item {
      font-size: 24px;
      line-height: 1.5;
      margin: 16px 0;
      display: flex;
      align-items: flex-start;
      gap: 15px;
    }
    .icon { font-size: 22px; }
    .footer { position: absolute; bottom: 40px; text-align: center; }
    .slide-num { font-size: 16px; opacity: 0.4; letter-spacing: 2px; margin-bottom: 8px; }
    .handle { font-size: 18px; opacity: 0.5; }
  </style>
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  
  <div class="num">1</div>
  <div class="emoji">⏰</div>
  <div class="title">Micro-Breaks</div>
  
  <div class="content-box">
    <div class="intro">You don't need an hour. Small moments add up.</div>
    <div class="item"><span class="icon">🚿</span> 2 minutes alone in the bathroom</div>
    <div class="item"><span class="icon">🎧</span> 5 minutes with headphones on</div>
    <div class="item"><span class="icon">🚗</span> Deep breaths in the car (before going in)</div>
    <div class="item"><span class="icon">☕</span> Drink your coffee while it's still HOT</div>
    <div class="item"><span class="icon">📱</span> 3 minutes scrolling something mindless</div>
  </div>
  
  <div class="footer">
    <div class="slide-num">1 of 4</div>
    <div class="handle">@spectrum_unlocked</div>
  </div>
</body>
</html>

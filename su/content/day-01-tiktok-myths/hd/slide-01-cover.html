<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      width: 2160px; height: 2700px; 
      font-family: 'Poppins', sans-serif; color: white;
      background: linear-gradient(165deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 120px;
      position: relative; overflow: hidden;
    }
    .bg-shape { position: absolute; border-radius: 50%; opacity: 0.08; }
    .bg-shape-1 { width: 1000px; height: 1000px; background: #E74C3C; top: -300px; right: -300px; }
    .bg-shape-2 { width: 700px; height: 700px; background: #E8B86D; bottom: 200px; left: -200px; }
    .badge { 
      background: #E74C3C; 
      padding: 24px 60px; 
      border-radius: 60px; 
      font-size: 36px; 
      font-weight: 700; 
      text-transform: uppercase; 
      letter-spacing: 6px;
      margin-bottom: 80px;
    }
    .main-title { 
      font-family: 'Playfair Display', serif; 
      font-size: 144px; 
      font-weight: 800; 
      line-height: 1.1; 
      margin-bottom: 60px;
      max-width: 1800px;
    }
    .highlight { color: #E74C3C; }
    .highlight-gold { color: #E8B86D; }
    .subtitle {
      font-size: 56px;
      opacity: 0.85;
      margin-bottom: 100px;
      max-width: 1600px;
      line-height: 1.4;
    }
    .swipe-cta {
      display: flex;
      align-items: center;
      gap: 30px;
      font-size: 44px;
      font-weight: 600;
      opacity: 0.7;
      margin-top: 60px;
    }
    .arrow { font-size: 60px; }
    .footer { position: absolute; bottom: 80px; text-align: center; }
    .handle { font-size: 40px; opacity: 0.5; }
  </style>
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>
  
  <div class="badge">🚨 Myth Alert</div>
  
  <div class="main-title">
    3 Things <span class="highlight">TikTok</span> Gets <span class="highlight-gold">WRONG</span> About Autism
  </div>
  
  <div class="subtitle">
    A new study found over 50% of autism content on social media is misleading. Let's set the record straight.
  </div>
  
  <div class="swipe-cta">
    <span>Swipe to learn the truth</span>
    <span class="arrow">→</span>
  </div>
  
  <div class="footer">
    <div class="handle">@spectrum_unlocked</div>
  </div>
</body>
</html>

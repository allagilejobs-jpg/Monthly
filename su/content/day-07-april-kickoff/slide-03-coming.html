<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      width: 1080px; height: 1350px; 
      font-family: 'Poppins', sans-serif; color: white;
      background: linear-gradient(165deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 60px;
      position: relative; overflow: hidden;
    }
    .bg-shape { position: absolute; border-radius: 50%; opacity: 0.06; }
    .bg-shape-1 { width: 400px; height: 400px; background: #E8B86D; bottom: -100px; right: -100px; }
    .label { 
      font-size: 18px; 
      text-transform: uppercase; 
      letter-spacing: 4px;
      opacity: 0.5;
      margin-bottom: 20px;
    }
    .title { 
      font-family: 'Playfair Display', serif; 
      font-size: 52px; 
      font-weight: 800; 
      margin-bottom: 50px;
      color: #E8B86D;
    }
    .topics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      max-width: 920px;
    }
    .topic-card {
      background: rgba(232, 184, 109, 0.1);
      border: 2px solid rgba(232, 184, 109, 0.2);
      border-radius: 16px;
      padding: 22px;
      text-align: center;
    }
    .topic-icon { font-size: 36px; margin-bottom: 10px; }
    .topic-text { font-size: 19px; line-height: 1.3; opacity: 0.9; }
    .highlight { 
      background: rgba(74, 144, 164, 0.2);
      border-color: rgba(74, 144, 164, 0.4);
    }
    .footer { position: absolute; bottom: 40px; text-align: center; }
    .slide-num { font-size: 16px; opacity: 0.4; letter-spacing: 2px; margin-bottom: 8px; }
    .handle { font-size: 18px; opacity: 0.5; }
  </style>
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  
  <div class="label">What's Coming</div>
  <div class="title">This Month's Content</div>
  
  <div class="topics-grid">
    <div class="topic-card highlight">
      <div class="topic-icon">🌍</div>
      <div class="topic-text">World Autism Day (April 2)</div>
    </div>
    <div class="topic-card">
      <div class="topic-icon">📋</div>
      <div class="topic-text">IEP Tips & Advocacy</div>
    </div>
    <div class="topic-card">
      <div class="topic-icon">🧠</div>
      <div class="topic-text">Autism Myths Busted</div>
    </div>
    <div class="topic-card">
      <div class="topic-icon">🍽️</div>
      <div class="topic-text">Feeding & Sensory</div>
    </div>
    <div class="topic-card">
      <div class="topic-icon">😴</div>
      <div class="topic-text">Sleep Strategies</div>
    </div>
    <div class="topic-card">
      <div class="topic-icon">🧬</div>
      <div class="topic-text">AuDHD & Comorbidities</div>
    </div>
    <div class="topic-card">
      <div class="topic-icon">👨‍👩‍👧‍👦</div>
      <div class="topic-text">Family Dynamics</div>
    </div>
    <div class="topic-card">
      <div class="topic-icon">💪</div>
      <div class="topic-text">Self-Care for Parents</div>
    </div>
  </div>
  
  <div class="footer">
    <div class="slide-num">2 of 3</div>
    <div class="handle">@spectrum_unlocked</div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      width: 1080px; height: 1350px; 
      font-family: 'Poppins', sans-serif; color: white;
      background: linear-gradient(165deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 60px;
      position: relative; overflow: hidden;
    }
    .bg-shape { position: absolute; border-radius: 50%; opacity: 0.06; }
    .bg-shape-1 { width: 400px; height: 400px; background: #27AE60; bottom: -100px; left: -100px; }
    .label { 
      background: #27AE60;
      padding: 12px 30px;
      border-radius: 30px;
      font-size: 18px; 
      font-weight: 700;
      text-transform: uppercase; 
      letter-spacing: 3px;
      margin-bottom: 30px;
    }
    .title { 
      font-family: 'Playfair Display', serif; 
      font-size: 52px; 
      font-weight: 800; 
      margin-bottom: 40px;
      color: #27AE60;
    }
    .dos {
      max-width: 900px;
    }
    .do-item {
      background: rgba(39, 174, 96, 0.10);
      border-left: 5px solid #27AE60;
      padding: 20px 30px;
      margin-bottom: 14px;
      border-radius: 0 16px 16px 0;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 18px;
    }
    .do-item .icon { font-size: 24px; flex-shrink: 0; }
    .do-item .text { font-size: 24px; line-height: 1.3; }
    .footer { position: absolute; bottom: 40px; text-align: center; }
    .slide-num { font-size: 16px; opacity: 0.4; letter-spacing: 2px; margin-bottom: 8px; }
    .handle { font-size: 18px; opacity: 0.5; }
  </style>
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  
  <div class="label">✅ During</div>
  <div class="title">DO This Instead</div>
  
  <div class="dos">
    <div class="do-item">
      <span class="icon">✓</span>
      <span class="text">Stay calm (regulate yourself first)</span>
    </div>
    <div class="do-item">
      <span class="icon">✓</span>
      <span class="text">Reduce sensory input (lights, noise)</span>
    </div>
    <div class="do-item">
      <span class="icon">✓</span>
      <span class="text">Give space if it's safe</span>
    </div>
    <div class="do-item">
      <span class="icon">✓</span>
      <span class="text">Use few, simple words (or none)</span>
    </div>
    <div class="do-item">
      <span class="icon">✓</span>
      <span class="text">Offer comfort items if accepted</span>
    </div>
    <div class="do-item">
      <span class="icon">✓</span>
      <span class="text">Just BE there. Presence matters.</span>
    </div>
  </div>
  
  <div class="footer">
    <div class="slide-num">3 of 5</div>
    <div class="handle">@spectrum_unlocked</div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      width: 1080px; height: 1350px; 
      font-family: 'Poppins', sans-serif; color: white;
      background: linear-gradient(165deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 60px;
      position: relative; overflow: hidden;
    }
    .bg-shape { position: absolute; border-radius: 50%; opacity: 0.06; }
    .bg-shape-1 { width: 400px; height: 400px; background: #4A90A4; top: -100px; left: -100px; }
    .label { 
      background: #4A90A4;
      padding: 12px 30px;
      border-radius: 30px;
      font-size: 18px; 
      font-weight: 700;
      text-transform: uppercase; 
      letter-spacing: 3px;
      margin-bottom: 30px;
    }
    .title { 
      font-family: 'Playfair Display', serif; 
      font-size: 52px; 
      font-weight: 800; 
      margin-bottom: 40px;
      color: #E8B86D;
    }
    .afters {
      max-width: 900px;
    }
    .after-item {
      background: rgba(74, 144, 164, 0.10);
      border-left: 5px solid #4A90A4;
      padding: 22px 30px;
      margin-bottom: 14px;
      border-radius: 0 16px 16px 0;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 18px;
    }
    .after-item .icon { font-size: 24px; flex-shrink: 0; }
    .after-item .text { font-size: 24px; line-height: 1.3; }
    .footer { position: absolute; bottom: 40px; text-align: center; }
    .slide-num { font-size: 16px; opacity: 0.4; letter-spacing: 2px; margin-bottom: 8px; }
    .handle { font-size: 18px; opacity: 0.5; }
  </style>
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  
  <div class="label">💙 After</div>
  <div class="title">Recovery Time</div>
  
  <div class="afters">
    <div class="after-item">
      <span class="icon">🕐</span>
      <span class="text">Give time to recover — they're exhausted</span>
    </div>
    <div class="after-item">
      <span class="icon">🚫</span>
      <span class="text">Don't lecture or punish</span>
    </div>
    <div class="after-item">
      <span class="icon">🤗</span>
      <span class="text">Reconnect when they're ready</span>
    </div>
    <div class="after-item">
      <span class="icon">📝</span>
      <span class="text">Note triggers for next time</span>
    </div>
    <div class="after-item">
      <span class="icon">💕</span>
      <span class="text">Reassure them they're loved</span>
    </div>
  </div>
  
  <div class="footer">
    <div class="slide-num">4 of 5</div>
    <div class="handle">@spectrum_unlocked</div>
  </div>
</body>
</html>

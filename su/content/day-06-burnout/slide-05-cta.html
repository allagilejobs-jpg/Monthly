<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      width: 1080px; height: 1350px; 
      font-family: 'Poppins', sans-serif; color: white;
      background: linear-gradient(165deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 60px;
      position: relative; overflow: hidden;
    }
    .bg-shape { position: absolute; border-radius: 50%; opacity: 0.08; }
    .bg-shape-1 { width: 500px; height: 500px; background: #4A90A4; top: -150px; right: -150px; }
    .bg-shape-2 { width: 350px; height: 350px; background: #E8B86D; bottom: 50px; left: -100px; }
    .emoji { font-size: 100px; margin-bottom: 40px; }
    .main-title { 
      font-family: 'Playfair Display', serif; 
      font-size: 54px; 
      font-weight: 800; 
      line-height: 1.2; 
      margin-bottom: 30px;
      max-width: 900px;
    }
    .highlight { color: #4A90A4; }
    .highlight-gold { color: #E8B86D; }
    .message-box {
      background: rgba(74, 144, 164, 0.15);
      border: 2px solid rgba(74, 144, 164, 0.3);
      padding: 35px 45px;
      border-radius: 20px;
      margin-bottom: 40px;
      max-width: 850px;
    }
    .message {
      font-size: 28px;
      line-height: 1.5;
    }
    .cta-box {
      background: linear-gradient(135deg, #4A90A4 0%, #2C5F6E 100%);
      padding: 25px 50px;
      border-radius: 16px;
      margin-bottom: 25px;
    }
    .cta-text {
      font-size: 24px;
      font-weight: 700;
    }
    .question {
      font-size: 22px;
      opacity: 0.7;
    }
    .footer { position: absolute; bottom: 40px; text-align: center; }
    .handle { font-size: 20px; opacity: 0.6; }
  </style>
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>
  
  <div class="emoji">💙</div>
  
  <div class="main-title">
    You're Not <span class="highlight-gold">Broken</span>. You're <span class="highlight">Exhausted</span>.
  </div>
  
  <div class="message-box">
    <div class="message">
      Burnout is your body saying "I can't keep going like this." Listen to it. Rest isn't earned — it's necessary.
    </div>
  </div>
  
  <div class="cta-box">
    <div class="cta-text">💾 Save for when you or someone you love needs it</div>
  </div>
  
  <div class="question">
    💬 Have you experienced autistic burnout? Share in comments.
  </div>
  
  <div class="footer">
    <div class="handle">@spectrum_unlocked</div>
  </div>
</body>
</html>

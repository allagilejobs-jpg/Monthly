<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      width: 1080px; height: 1350px; 
      font-family: 'Poppins', sans-serif; color: white;
      background: linear-gradient(165deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 60px;
      position: relative; overflow: hidden;
    }
    .bg-shape { position: absolute; border-radius: 50%; opacity: 0.06; }
    .bg-shape-1 { width: 400px; height: 400px; background: #27AE60; top: -100px; left: -100px; }
    .num { 
      background: #27AE60; 
      width: 80px; height: 80px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; font-weight: 800;
      margin-bottom: 25px;
    }
    .emoji { font-size: 80px; margin-bottom: 20px; }
    .title { 
      font-family: 'Playfair Display', serif;
      font-size: 48px; 
      font-weight: 800; 
      color: #E8B86D;
      margin-bottom: 30px;
    }
    .desc {
      font-size: 26px;
      line-height: 1.5;
      max-width: 850px;
      margin-bottom: 30px;
      opacity: 0.95;
    }
    .pro-tip {
      background: rgba(39, 174, 96, 0.15);
      border: 2px solid rgba(39, 174, 96, 0.3);
      border-radius: 16px;
      padding: 25px 35px;
      max-width: 800px;
      text-align: left;
    }
    .pro-tip-label { font-size: 16px; color: #27AE60; font-weight: 700; margin-bottom: 10px; }
    .pro-tip-text { font-size: 22px; opacity: 0.85; line-height: 1.4; }
    .footer { position: absolute; bottom: 40px; text-align: center; }
    .slide-num { font-size: 16px; opacity: 0.4; letter-spacing: 2px; margin-bottom: 8px; }
    .handle { font-size: 18px; opacity: 0.5; }
  </style>
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  
  <div class="num">1</div>
  <div class="emoji">📅</div>
  <div class="title">Visual Schedules</div>
  
  <div class="desc">
    Shows what's happening and WHEN. Reduces anxiety about transitions and builds independence.
  </div>
  
  <div class="pro-tip">
    <div class="pro-tip-label">💡 WHY IT WORKS</div>
    <div class="pro-tip-text">
      • Prevents "what's next?" meltdowns<br>
      • Gives a sense of control<br>
      • Can use pictures, words, or both<br>
      • Great for morning/bedtime routines
    </div>
  </div>
  
  <div class="footer">
    <div class="slide-num">1 of 4</div>
    <div class="handle">@spectrum_unlocked</div>
  </div>
</body>
</html>

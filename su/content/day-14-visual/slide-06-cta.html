<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      width: 1080px; height: 1350px; 
      font-family: 'Poppins', sans-serif; color: white;
      background: linear-gradient(165deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 60px;
      position: relative; overflow: hidden;
    }
    .bg-shape { position: absolute; border-radius: 50%; opacity: 0.08; }
    .bg-shape-1 { width: 500px; height: 500px; background: #27AE60; top: -150px; right: -150px; }
    .bg-shape-2 { width: 350px; height: 350px; background: #E8B86D; bottom: 50px; left: -100px; }
    .emoji { font-size: 100px; margin-bottom: 35px; }
    .main-title { 
      font-family: 'Playfair Display', serif; 
      font-size: 52px; 
      font-weight: 800; 
      line-height: 1.3; 
      margin-bottom: 35px;
      max-width: 900px;
    }
    .highlight { color: #E8B86D; }
    .subtitle {
      font-size: 26px;
      opacity: 0.85;
      margin-bottom: 40px;
      max-width: 800px;
      line-height: 1.5;
    }
    .cta-box {
      background: linear-gradient(135deg, #27AE60 0%, #1E8449 100%);
      padding: 30px 50px;
      border-radius: 20px;
      margin-bottom: 30px;
    }
    .cta-text {
      font-size: 26px;
      font-weight: 700;
    }
    .question {
      font-size: 24px;
      opacity: 0.9;
      margin-bottom: 30px;
    }
    .actions {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .action-item {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 22px;
      font-weight: 600;
      opacity: 0.8;
    }
    .footer { position: absolute; bottom: 40px; text-align: center; }
    .handle { font-size: 22px; opacity: 0.6; }
    .follow-text { font-size: 16px; opacity: 0.4; margin-bottom: 8px; letter-spacing: 2px; }
  </style>
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>
  
  <div class="emoji">💾</div>
  
  <div class="main-title">
    Save This & Start Using <span class="highlight">Visuals Today!</span>
  </div>
  
  <div class="subtitle">
    Small tools, BIG impact. You don't need fancy supplies — paper and markers work!
  </div>
  
  <div class="cta-box">
    <div class="cta-text">📩 DM "VISUALS" for free templates</div>
  </div>
  
  <div class="question">
    Which visual support works best for YOUR family? 👇
  </div>
  
  <div class="actions">
    <div class="action-item">📤 Share</div>
    <div class="action-item">💬 Comment</div>
    <div class="action-item">➕ Follow for more</div>
  </div>
  
  <div class="footer">
    <div class="follow-text">PRACTICAL AUTISM TOOLS</div>
    <div class="handle">@spectrum_unlocked</div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      width: 1080px; height: 1350px; 
      font-family: 'Poppins', sans-serif; color: white;
      background: linear-gradient(165deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 60px;
      position: relative; overflow: hidden;
    }
    .bg-shape { position: absolute; border-radius: 50%; opacity: 0.06; }
    .bg-shape-1 { width: 400px; height: 400px; background: #E74C3C; top: -100px; right: -100px; }
    .myth-badge { 
      background: #E74C3C; 
      padding: 15px 40px; 
      border-radius: 35px; 
      font-size: 20px; 
      font-weight: 700; 
      text-transform: uppercase; 
      letter-spacing: 4px;
      margin-bottom: 40px;
    }
    .myth-icon { font-size: 80px; margin-bottom: 30px; }
    .myth-text { 
      font-family: 'Playfair Display', serif;
      font-size: 38px; 
      font-weight: 700; 
      line-height: 1.3; 
      margin-bottom: 50px;
      max-width: 850px;
      padding: 30px 40px;
      background: rgba(231, 76, 60, 0.15);
      border-radius: 20px;
      border-left: 6px solid #E74C3C;
    }
    .truth-badge { 
      background: #27AE60; 
      padding: 15px 40px; 
      border-radius: 35px; 
      font-size: 20px; 
      font-weight: 700; 
      text-transform: uppercase; 
      letter-spacing: 4px;
      margin-bottom: 30px;
    }
    .truth-text { 
      font-size: 26px; 
      line-height: 1.5; 
      opacity: 0.95;
      max-width: 850px;
      padding: 25px 35px;
      background: rgba(39, 174, 96, 0.12);
      border-radius: 16px;
    }
    .footer { position: absolute; bottom: 40px; text-align: center; }
    .slide-num { font-size: 16px; opacity: 0.4; letter-spacing: 2px; margin-bottom: 8px; }
    .handle { font-size: 18px; opacity: 0.5; }
  </style>
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  
  <div class="myth-badge">❌ Myth #5</div>
  
  <div class="myth-icon">💊</div>
  
  <div class="myth-text">
    "Autism can be cured or outgrown"
  </div>
  
  <div class="truth-badge">✅ The Truth</div>
  
  <div class="truth-text">
    Autism is a lifelong neurotype — not a disease that needs curing. Support and accommodations help autistic people thrive. The goal isn't to "fix" them; it's to understand and accept them.
  </div>
  
  <div class="footer">
    <div class="slide-num">5 of 5</div>
    <div class="handle">@spectrum_unlocked</div>
  </div>
</body>
</html>
